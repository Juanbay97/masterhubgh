services:
  mariadb:
    image: mariadb:10.6
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-frappe}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MARIADB_ROOT_PASSWORD:-frappe}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  backend:
    image: frappe/bench:latest
    environment:
      SHELL: /bin/bash
    volumes:
      - ../frappe-bench/apps:/home/frappe/frappe-bench/apps
      - ../frappe-bench/sites:/home/frappe/frappe-bench/sites
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    ports:
      - "80:8000"
    command: >
      bash -lc "cd /home/frappe/frappe-bench && bench start"

volumes:
  mariadb_data:
