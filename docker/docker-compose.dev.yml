services:
  mariadb:
    image: mariadb:10.6
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-frappe}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MARIADB_ROOT_PASSWORD:-frappe}"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  backend:
    image: frappe/bench:latest
    env_file:
      - ../.env
    environment:
      SHELL: /bin/bash
      HUBGH_RUNTIME_MODE: development
    volumes:
      - bench_data:/home/frappe/frappe-bench
      - ../hubgh:/home/frappe/frappe-bench/apps/hubgh
      - sites_data:/home/frappe/frappe-bench/sites
      - ./runtime-common.sh:/runtime-common.sh:ro
      - ./entrypoint.dev.sh:/entrypoint.dev.sh:ro
      - ./create-site.sh:/create-site.sh
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    ports:
      - "80:8000"
      - "9000:9000"
    command: ["bash", "/entrypoint.dev.sh"]

volumes:
  mariadb_data:
  bench_data:
  sites_data:
