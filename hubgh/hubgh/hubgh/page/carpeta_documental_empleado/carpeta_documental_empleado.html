<div class="hub-shell">
	<div class="hub-toolbar">
		<input class="hub-search" placeholder="Buscar por nombre, cédula o punto de venta" />
		<button class="hub-btn hub-btn--primary btn-search"><i class="fa fa-search"></i> Buscar</button>
	</div>
	<div class="hub-grid"></div>
</div>

<div class="hub-drawer-overlay">
	<div class="hub-drawer">
		<div class="hub-drawer__header">
			<div>
				<div class="hub-drawer__title">Detalle empleado</div>
				<div class="hub-drawer__subtitle"></div>
			</div>
			<div class="hub-drawer__actions">
				<button class="hub-btn hub-btn--icon btn-download-zip" title="Descargar ZIP"><i class="fa fa-file-archive-o"></i></button>
				<button class="hub-btn hub-btn--icon btn-close-drawer" title="Cerrar"><i class="fa fa-times"></i></button>
			</div>
		</div>
		<div class="hub-drawer__body"></div>
	</div>
</div>
